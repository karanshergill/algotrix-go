services:
  regime-classifier:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - PGHOST=host.docker.internal
      - PGPORT=5432
      - PGDATABASE=atdb
      - PGUSER=me
      - PGPASSWORD=algotrix
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./models:/app/models
    # Override command for different operations:
    # Classify single date:
    #   docker compose run --rm regime-classifier classify --date 2026-03-19
    # Backfill:
    #   docker compose run --rm regime-classifier classify --from 2025-09-01 --to 2026-03-19
    # Validate:
    #   docker compose run --rm regime-classifier validate --from 2025-09-01 --to 2026-03-19
