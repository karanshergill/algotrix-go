# Baseline plugins — each has enabled flag + params
baselines:
  volume_profile:
    enabled: true
    table: nse_cm_baseline_volume_profile
    source: ohlcv_5s
    bucket_size: 1.0
    value_area_pct: 70
    hvn_threshold: 1.5
    lvn_threshold: 0.5
    lookback_days: 30

  intraday_volume:
    enabled: true
    table: nse_cm_baseline_intraday_volume
    source: ohlcv_5s
    bin_size_minutes: 5
    lookback_days: 30

  atr_volatility:
    enabled: true
    table: nse_cm_baseline_atr_volatility
    source: ohlcv_5s
    atr_period: 14
    timeframes: ["5m", "15m", "1h"]
    regime_thresholds:
      compressed: 20
      expanded: 80
    lookback_days: 30

  support_resistance:
    enabled: true
    table: nse_cm_baseline_support_resistance
    depends_on: ["volume_profile"]
    cluster_pct: 0.5
    max_levels: 10
    recency_weight: 0.6
    lookback_days: 30

  correlations:
    enabled: true
    table: nse_cm_baseline_correlations
    source: ohlcv_5s
    return_timeframe: "5m"
    lookback_days: 20
    min_correlation: 0.5
    top_peers: 10

  squeeze:
    enabled: true
    table: nse_cm_baseline_squeeze
    source: ohlcv_1d
    bb_period: 20
    bb_std: 2
    adx_period: 14
    squeeze_bbw_percentile: 20
    lookback_days: 30

  daily_cvd:
    enabled: true
    table: nse_cm_baseline_daily_cvd
    source: ohlcv_5s
    trend_lookback_days: 5
    lookback_days: 30

  daily_volume:
    enabled: true
    table: nse_cm_baseline_daily_volume
    source: ohlcv_5s
    lookback_days: 30

  spread_estimate:
    enabled: true
    table: nse_cm_baseline_spread_estimate
    source: ohlcv_5s
    lookback_days: 30

  autocorrelation:
    enabled: true
    table: nse_cm_baseline_autocorrelation
    source: ohlcv_5s
    return_timeframe: "5m"
    lag: 1
    lookback_days: 20

  liquidity_tier:
    enabled: true
    table: nse_cm_baseline_liquidity_tier
    depends_on: ["daily_volume"]
    tiers:
      high: 500000000
      medium: 100000000
    lookback_days: 30
