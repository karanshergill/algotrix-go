# Connection settings
questdb:
  host: localhost
  http_port: 9000
  ilp_port: 9009

postgres:
  host: localhost
  port: 5432
  user: me
  password: algotrix  # TODO: use env var in production
  database: algotrix

# Source tables
sources:
  ohlcv_5s: nse_cm_ohlcv_5s
  ohlcv_1m: nse_cm_ohlcv_1m
  ohlcv_1d: nse_cm_ohlcv_1d
  scrip_master: nse_cm_scrips

# NSE holidays
nse_holidays:
  - "2025-02-26"
