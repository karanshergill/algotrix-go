syntax = "proto3";

import "google/protobuf/wrappers.proto";
option go_package = "github.com/karanshergill/algotrix-go/feed/proto";

message MarketLevel {
    google.protobuf.Int64Value price = 1;
    google.protobuf.UInt32Value qty  = 2;
    google.protobuf.UInt32Value nord = 3;
    google.protobuf.UInt32Value num = 4;
}

message Depth {
    google.protobuf.UInt64Value tbq = 1;
    google.protobuf.UInt64Value tsq = 2;
    repeated MarketLevel asks = 3;
    repeated MarketLevel bids = 4;
}

message Quote {
    google.protobuf.Int64Value  ltp = 1;
    google.protobuf.UInt32Value ltt = 2;
    google.protobuf.UInt32Value ltq = 3;
    google.protobuf.UInt64Value vtt = 4;
    google.protobuf.UInt64Value vtt_diff = 5;
    google.protobuf.UInt64Value oi = 6;
    google.protobuf.Int64Value  ltpc = 7;
}

message ExtendedQuote {
    google.protobuf.Int64Value atp = 1;
    google.protobuf.Int64Value cp = 2;
    google.protobuf.UInt32Value lc = 3;
    google.protobuf.UInt32Value uc = 4;
    google.protobuf.Int64Value yh = 5;
    google.protobuf.Int64Value yl = 6;
    google.protobuf.UInt64Value poi = 7;
    google.protobuf.Int64Value  oich = 8;
    google.protobuf.UInt32Value pc = 9;
}

message DailyQuote {
    google.protobuf.Int64Value do = 1;
    google.protobuf.Int64Value dh = 2;
    google.protobuf.Int64Value dl = 3;
    google.protobuf.Int64Value dc = 4;
    google.protobuf.UInt64Value dhoi = 5;
    google.protobuf.UInt64Value dloi = 6;
}

message OHLCV {
    google.protobuf.Int64Value open = 1;
    google.protobuf.Int64Value high = 2;
    google.protobuf.Int64Value low = 3;
    google.protobuf.Int64Value close = 4;
    google.protobuf.UInt32Value volume = 5;
    google.protobuf.UInt32Value epoch = 6;
}

message SymDetail {
    string ticksize = 1;
}

enum MessageType {
    ping = 0;
    quote = 1;
    extended_quote = 2;
    daily_quote = 3;
    market_level = 4;
    ohlcv = 5;
    depth = 6;
    all = 7;
    response = 8;
}

message MarketFeed {
    Quote quote = 1;
    ExtendedQuote eq = 2;
    DailyQuote dq = 3;
    OHLCV ohlcv = 4;
    Depth depth = 5;
    google.protobuf.UInt64Value feed_time = 6;
    google.protobuf.UInt64Value send_time = 7;
    string token = 8;
    uint64 sequence_no = 9;
    bool snapshot = 10;
    string ticker = 11;
    SymDetail symdetail = 12;
}

message SocketMessage {
    MessageType type = 1;
    map<string, MarketFeed> feeds = 2;
    bool snapshot = 3;
    string msg = 4;
    bool error = 5;
}
